<html>
    <head>
        <!--Here go the fonts and reference to the style sheet-->
        <title>Insomnia</title>
        <link href="css/stylesheet.css" rel="stylesheet">
        <meta charset="UTF-8">
        <link rel="icon" type="image/x-icon" href="https://www.opleague.pro/styles/media/team/3100/Logo_200.webp?1675771361"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Birthstone&family=DotGothic16&family=Honk:MORF@15&display=swap" rel="stylesheet">
        <link href="Fight!.woff" rel="stylesheet">
    </head>

    <body>
        <!--We need the header with the picture and home button-->
        <header>
            <div class="forestImgContainer">
                <img class="forestImg" src="assets/ForestHeader.jpeg" alt="Forest Treeline" style="width:100%;"/>
                <a href="index.html">
                    <button class="homeBtn" type="button">home</button>
                </a>
                <h1 class="headerTitle">Insomnia-Gallery</h1>
            </div>
        </header>
        <main class="gallery-container">
            <h1 class="gallery-title">The Art Archive</h1>
            <div class="art-grid">

                <div class="art-card">
                    <div class="art-frame">
                        <img src="assets/EryV3.jpg" alt="Artfight">
                    </div>
                    <p class="art-caption">Artfight</p>
                </div>

                <div class="art-card">
                    <div class="art-frame">
                        <img src="assets/art/bach.jpeg" alt="Bach">
                    </div>
                    <p class="art-caption">Bach</p>
                </div>

                <div class="art-card">
                    <div class="art-frame">
                        <img src="assets/art/bench.JPG" alt="Bench">
                    </div>
                    <p class="art-caption">bench</p>
                </div>

                <div class="art-card">
                    <div class="art-frame">
                        <img src="assets/art/ghost1.jpeg" alt="ghost">
                    </div>
                    <p class="art-caption">Spooky</p>
                </div>

                <div class="art-card">
                    <div class="art-frame">
                        <img src="assets/art/ghost2.jpeg" alt="ghost in bush">
                    </div>
                    <p class="art-caption">spoooky</p>
                </div>

                <div class="art-card">
                    <div class="art-frame">
                        <img src="assets/art/leaf.JPG" alt="leaf">
                    </div>
                    <p class="art-caption">Leaf</p>
                </div>

                <div class="art-card">
                    <div class="art-frame">
                        <img src="assets/art/sigh.JPG" alt="sign">
                    </div>
                    <p class="art-caption">Sign</p>
                </div>

                <div class="art-card">
                    <div class="art-frame">
                        <img src="assets/art/Plane.jpeg" alt="sky">
                    </div>
                    <p class="art-caption">Plane</p>
                </div>

                <div class="art-card">
                    <div class="art-frame">
                        <img src="assets/art/Steve_unmasked.jpg" alt="dnd character">
                    </div>
                    <p class="art-caption">DND character</p>
                </div>

                <div class="art-card">
                    <div class="art-frame">
                        <img src="assets/art/pond.jpeg" alt="pond">
                    </div>
                    <p class="art-caption">Pond</p>
                </div>

            </div>
            <!--*Each artwork belongs into its own art-card-->
        </main>
        <footer>
        <!--here would be the place to put the footer with some information, but im not yet sure which information-->
        </footer>
    </body>
</html>
